name: Reusable Node.js Build

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use.
        required: false
        type: string
        default: "20"
      package-manager:
        description: Package manager, one of npm, yarn, or pnpm.
        required: false
        type: string
        default: npm
      working-directory:
        description: Directory containing the Node.js project.
        required: false
        type: string
        default: .
     

jobs:
  build:
    name: Node.js Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          #cache: ${{ inputs.package-manager }}
          #cache-dependency-path: |
          #  ${{ inputs.working-directory }}/package-lock.json
      - run: npm ci
      - name: Install Dependencies
        run: npm install --no-package-lock
      - name : npm build
        run: npm run build
      - name: Check Directory
        run: |
            ls -ltrh
